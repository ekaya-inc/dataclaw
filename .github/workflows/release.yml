name: Release Binaries

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to release (for example v1.0.0)
        required: true

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "24"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Get version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          VERSION_NO_V="${VERSION#v}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "version_no_v=${VERSION_NO_V}" >> "${GITHUB_OUTPUT}"
          echo "Version: ${VERSION}"

      - name: Install dependencies
        run: |
          go mod download
          cd ui && npm ci

      - name: Build UI and embed assets
        run: make build-ui

      - name: Build release binaries
        run: |
          mkdir -p dist
          PLATFORMS="darwin/amd64 darwin/arm64 linux/amd64 linux/arm64 windows/amd64"

          for platform in ${PLATFORMS}; do
            GOOS="${platform%/*}"
            GOARCH="${platform#*/}"
            OUTPUT_NAME="dataclaw"
            ARCHIVE_NAME="dataclaw_${{ steps.version.outputs.version_no_v }}_${GOOS}_${GOARCH}"

            if [ "${GOOS}" = "windows" ]; then
              OUTPUT_NAME="dataclaw.exe"
            fi

            echo "Building ${GOOS}/${GOARCH}..."
            CGO_ENABLED=0 GOOS="${GOOS}" GOARCH="${GOARCH}" go build \
              -trimpath \
              -ldflags="-s -w -X main.Version=${{ steps.version.outputs.version }}" \
              -o "dist/${ARCHIVE_NAME}/${OUTPUT_NAME}" .

            cp .env.example "dist/${ARCHIVE_NAME}/.env.example"
            cp README.md "dist/${ARCHIVE_NAME}/"
            cp LICENSE "dist/${ARCHIVE_NAME}/"

            if [ "${GOOS}" = "windows" ]; then
              (cd dist && zip -q "${ARCHIVE_NAME}.zip" -r "${ARCHIVE_NAME}/")
            else
              tar -czf "dist/${ARCHIVE_NAME}.tar.gz" -C dist "${ARCHIVE_NAME}"
            fi

            rm -rf "dist/${ARCHIVE_NAME}"
          done

      - name: Copy installer script to dist
        run: cp install.sh dist/install.sh

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.zip install.sh > checksums.txt
          cat checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
            dist/install.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

